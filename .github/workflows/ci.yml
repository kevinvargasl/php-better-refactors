name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - name: Compile
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint src

      - name: Build
        run: npx tsc -p ./

      - name: Unit tests
        run: npx mocha 'out/test/unit/**/*.test.js'
